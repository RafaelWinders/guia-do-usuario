name: Validate Documentation

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'requirements.txt'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build site
        # Note: --strict would abort on pending TODO screenshots,
        # which are intentional placeholders. See TODO-SCREENSHOTS.md.
        # Re-enable --strict once all images are captured.
        run: mkdocs build
